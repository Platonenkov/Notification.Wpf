name: Publish NuGet.org

on:
  push:
    branches: [ master ]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    name: Build, Test & Publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install MAUI workloads
        run: dotnet workload install maui-windows android ios maccatalyst

      - name: Build Core
        run: dotnet build src/Notification.Core/Notification.Core.csproj -c Release

      - name: Build WPF
        run: dotnet build src/Notification.Wpf/Notification.Wpf.csproj -c Release

      - name: Build Console
        run: dotnet build src/Notification.Console/Notification.Console.csproj -c Release

      - name: Build Avalonia
        run: dotnet build src/Notification.Avalonia/Notification.Avalonia.csproj -c Release

      - name: Build MAUI
        run: dotnet build src/Notification.Maui/Notification.Maui.csproj -c Release

      - name: Test Core
        run: dotnet test Tests/Notification.Core.Tests/Notification.Core.Tests.csproj -c Release --verbosity minimal

      - name: Test Console
        run: dotnet test Tests/Notification.Console.Tests/Notification.Console.Tests.csproj -c Release --verbosity minimal

      - name: Test WPF Adapters
        run: dotnet test Tests/Notification.Wpf.Tests/Notification.Wpf.Tests.csproj -c Release --verbosity minimal

      - name: Pack Core
        run: dotnet pack src/Notification.Core/Notification.Core.csproj -c Release --no-build

      - name: Pack WPF
        run: dotnet pack src/Notification.Wpf/Notification.Wpf.csproj -c Release --no-build

      - name: Pack Console
        run: dotnet pack src/Notification.Console/Notification.Console.csproj -c Release --no-build

      - name: Pack Avalonia
        run: dotnet pack src/Notification.Avalonia/Notification.Avalonia.csproj -c Release --no-build

      - name: Pack MAUI
        run: dotnet pack src/Notification.Maui/Notification.Maui.csproj -c Release --no-build

      - name: Publish GitHub
        run: |
          dotnet nuget push "**/*.nupkg" --skip-duplicate --source https://nuget.pkg.github.com/Platonenkov/index.json -k ${{secrets.GITHUB_TOKEN}}
          dotnet nuget push "**/*.snupkg" --skip-duplicate --source https://nuget.pkg.github.com/Platonenkov/index.json -k ${{secrets.GITHUB_TOKEN}}

      - name: Publish NuGet
        run: |
          dotnet nuget push "**/*.nupkg" --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGETAPIKEY }}
          dotnet nuget push "**/*.snupkg" --skip-duplicate -s https://api.nuget.org/v3/index.json -k ${{ secrets.NUGETAPIKEY }}
